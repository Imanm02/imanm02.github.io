<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <nav class="site-nav" id="nav">
    <a href="{{ '/' | relative_url }}" class="nav-logo">Iman Mohammadi</a>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}#about">About</a></li>
      <li><a href="{{ '/research' | relative_url }}">Research</a></li>
      <li><a href="{{ '/projects' | relative_url }}">Projects</a></li>
      <li><a href="{{ '/teaching' | relative_url }}">Teaching</a></li>
      <li><a href="{{ '/service' | relative_url }}">Service</a></li>
      <li><a href="{{ '/honors' | relative_url }}">Honors</a></li>
    </ul>
    <button class="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
    </div>
    {{ content }}
  </div>

  <footer class="site-footer">
    <p class="footer-line">© {{ 'now' | date: "%Y" }} {{ site.data.bio.name }}</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const nav = document.querySelector('.site-nav');
      if (nav) window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 40));
      const burger = document.querySelector('.nav-burger');
      const navLinks = document.querySelector('.nav-links');
      if (burger && navLinks) {
        burger.addEventListener('click', () => { navLinks.classList.toggle('open'); burger.classList.toggle('active'); });
        navLinks.querySelectorAll('a').forEach(l => l.addEventListener('click', () => { navLinks.classList.remove('open'); burger.classList.remove('active'); }));
      }
    });
  </script>
</body>
</html>
