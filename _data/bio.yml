name: "Iman Mohammadi"
tagline: "PhD Student in Computer Science at UC Irvine"
photo: "/Iman.jpg"

bio: "I am a PhD student in Computer Science at the <a href='https://uci.edu'>University of California, Irvine</a>, advised by <a href='https://habiba-farrukh.github.io/'>Prof. Habiba Farrukh</a> at the SPECT Lab. My research focuses on Human-Computer Interaction, Social Computing & VR, and Interactive Systems & Safety."

about:
  - "My work explores how people interact with emerging computing platforms and how we can design safer, more equitable digital experiences. I am particularly interested in understanding safety and moderation mechanisms in social VR platforms, privacy perceptions in social media, and the design of decentralized and collaborative systems."
  - "Before joining UC Irvine, I completed my Bachelor's in Computer Engineering at <a href='https://en.sharif.edu'>Sharif University of Technology</a>. I have had the privilege of collaborating with research labs at Duke University, the University of Salerno, the Chinese University of Hong Kong, and the Tehran Institute for Advanced Studies. My work has been published at top HCI venues including ACM CHI and ACM CSCW."

interests:
  - "Human-Computer Interaction"
  - "Social Computing & VR"
  - "Interactive Systems & Safety"
  - "Security and Privacy"
  - "Applied AI"

